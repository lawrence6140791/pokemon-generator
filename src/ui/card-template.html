<!-- card-template.html
  定義卡片 DOM 結構：front / back
  使用時由 card.js 載入並克隆。
-->
<template id="pokemon-card-template">
  <div class="poke-card" data-id="" aria-live="polite">
    <div class="poke-card-inner">
      <div class="poke-card-face front bg-white">
        <div class="hp-badge">HP <span class="hp-value">0</span></div>
        <div class="image-wrapper mb-2 text-center">
          <img class="sprite img-fluid" alt="pokemon image" />
        </div>
        <div class="fw-bold name mb-1">—</div>
        <div class="english-name text-capitalize small text-muted mb-2"></div>
        <div class="types d-flex gap-2 flex-wrap justify-content-center mb-2"></div>
        <div class="stats-row w-100 d-flex justify-content-around mt-auto pt-2">
          <div class="stat-item text-center"><div class="stat-label small">HP</div><div class="stat-value hp">0</div></div>
          <div class="stat-item text-center"><div class="stat-label small">攻擊</div><div class="stat-value attack">0</div></div>
            <div class="stat-item text-center"><div class="stat-label small">防禦</div><div class="stat-value defense">0</div></div>
          <div class="stat-item text-center"><div class="stat-label small">速度</div><div class="stat-value speed">0</div></div>
        </div>
        <div class="hint small text-muted mt-2">點擊翻面查看更多</div>
      </div>
      <div class="poke-card-face back bg-white">
        <div class="back-image-wrapper mb-2 text-center">
          <img class="animated img-fluid" alt="pokemon animated image" />
        </div>
        <div class="description small"></div>
        <div class="small text-muted mt-2">再次點擊翻回正面</div>
      </div>
    </div>
  </div>
</template>
